name: FitApp Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (Python/Flask)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 . \
            --exclude=__pycache__,migrations,venv,database \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E305,E203,F401,F541,E741,F841,E701,E712,E226,W292 \
            --count --statistics

      - name: Run tests
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-secret-key
          SECRET_KEY: ci-test-app-secret
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            -v \
            --tb=short
