name: FitApp Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (Python/Flask)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 . \
            --exclude=__pycache__,migrations,venv,database \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E305,E203,F401,F541,E741,F841,E701,E712,E226,W292 \
            --count --statistics

      - name: Run tests
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-secret-key
          SECRET_KEY: ci-test-app-secret
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            -v \
            --tb=short

  deploy:
    name: Deploy backend to test server
    needs: backend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    concurrency:
      group: deploy-backend
      cancel-in-progress: false

    steps:
      - name: Pull latest backend code
        run: |
          cd ~/fitness-app/CS-490-Project-Backend-
          git fetch --all
          git reset --hard origin/main

      - name: Rebuild and restart backend container
        run: |
          cd ~/fitness-app
          docker compose --profile test up -d --build backend_test

      - name: Health check
        run: |
          cd ~/fitness-app
          for i in $(seq 1 20); do
            if docker compose --profile test exec -T backend_test \
                 curl -fsS http://localhost:5000/health; then
              exit 0
            fi
            echo "Health check attempt $i failed; retrying in 3s..."
            sleep 3
          done
          echo "Health check failed after 20 attempts. Recent backend logs:"
          docker compose --profile test logs --tail=100 backend_test
          exit 1
